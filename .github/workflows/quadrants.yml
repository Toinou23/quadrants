name: Mise à jour des 4 quadrants

on:
  schedule:
    - cron: "30 22 * * 1-5"   # chaque soir de semaine, 22h30 UTC (~00h30 Paris)
  workflow_dispatch: {}        # bouton "Run workflow" pour lancer à la main

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Calcul des quadrants
        env:
          ALPHAVANTAGE_KEY: ${{ secrets.ALPHAVANTAGE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python quadrants.py

      - name: Publication
        run: |
          git config user.name "quadrants-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Mise à jour quotidienne" || echo "Rien à publier"
          git push
